id: real-estate
name: Real Estate
version: 1
description: Searches for Zillow real estate listings in Greenvilles SC and saves them to a simple file.

agents:
  - id: searcher
    name: Searcher
    role: websearch
    description: Does the actual querying of Zillow through the browser or api.
    workspace:
      files:
        AGENTS.md: agents/real-estate/searcher/AGENTS.md

  - id: saver
    name: Saver
    role: saving
    description: Given a list of zillow listings from the searcher agent, save the list.
    workspace:
      files:
        AGENTS.md: agents/real-estate/saver/AGENTS.md

runs:
  - id: prospect
    name: Prospect for houses
    description: Search Zillow and save listings
    steps:
      - id: search
        agent: searcher
        input: |
          Task: {{task}}

          GO to Zillow, look in Greenville SC for houses for sale, Come up with a list of the top 10 houses in terms of price ( i want the most expensive house in greenville). and give them to the Saver agent to save in whatever manner he choses.

          Reply with:
          STATUS: done
          LISTINGS: <listings>

      - id: save
        agent: saver
        input: |
          LISTINGS:
          {{listings}}

          Take the 10 listings given to you by searcher and save them as a text file in ~/Projects folder of my computer

          Reply with:
          STATUS: done
          FILENAME: filename
        expects: "STATUS: done"
        max_retries: 3
