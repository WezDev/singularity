id: testing-one
name: First Test
version: 1
description: A simple two-agent workflow.

agents:
  - id: planner
    name: Planner
    role: analysis
    description: Breaks down the task into actionable steps.
    workspace:
      files:
        AGENTS.md: agents/my-workflow/planner/AGENTS.md

  - id: executor
    name: Executor
    role: coding
    description: Implements the plan.
    timeoutSeconds: 1200
    workspace:
      files:
        AGENTS.md: agents/my-workflow/executor/AGENTS.md

runs:
  - id: default
    name: Default
    description: Plan and execute
    steps:
      - id: plan
        agent: planner
        input: |
          Task: {{task}}

          Analyze this task and create a plan.

          Reply with:
          STATUS: done
          PLAN_NOTES: <your plan>
        expects: "STATUS: done"

      - id: execute
        agent: executor
        input: |
          Task: {{task}}

          Plan:
          {{plan_notes}}

          Implement the plan above.

          Reply with:
          STATUS: done
          RESULT: <summary of what was done>
        expects: "STATUS: done"
